# Lima template for the iceclimber **acceptance demo** sandbox.
#
# Unlike test/lima/sandbox.yaml (the functional-test box), this VM has a real
# agent living inside it: Claude Code, on Alpine/musl. The demo proves the core
# premise — a sandbox that genuinely can't reach the network is bridged by Popo —
# by air-gapping the VM (see demo-firewall.sh) down to *only* the Claude API, then
# letting the agent provision Python, packages, and web data through iceclimber.
#
# Provisioning below runs at first boot **while the network is still open**; the
# air-gap firewall is applied later, on demand, by the demo harness. See DEMO.md.
#
# Usage (via the Makefile):
#   make demo-up         # boot + provision this VM
#   make demo-live       # operator-driven walkthrough
#   make demo            # fully-automated acceptance run (CI)
#   make demo-down
minimumLimaVersion: 2.0.0

base:
- template:_images/alpine-3.23

# Apple Virtualization.framework. Fall back to "qemu" if vz misbehaves.
vmType: vz

# Heavier than the functional box: it carries the relayed-in Claude Code binary
# (~220 MB) + a ~210 MB python-build-standalone runtime + wheels.
cpus: 2
memory: 4GiB
disk: 8GiB

containerd:
  system: false
  user: false

# No host mounts — keep the guest a real locked-down sandbox (no host FS leaking
# in), exactly like the functional box.
mounts: []

# First-boot provisioning, network still open. Installs only the agent's musl
# prerequisites that iceclimber does NOT provide; Node + the Claude Code CLI itself
# are installed by `iceclimber agent install claude` (see demo-run.sh / demo-live.sh),
# which relays the agent binary in from the controller (no sandbox network needed).
provision:
- mode: system
  script: |
    #!/bin/sh
    set -eux
    apk update
    # Agent prerequisites NOT provided by iceclimber:
    #   libgcc/libstdc++  — musl needs these for the agent's native binary
    #   ripgrep           — system rg; the agent env sets USE_BUILTIN_RIPGREP=0
    #                       (the bundled rg is glibc-built and won't run on musl)
    #   bash              — the agent's shell tool needs a real bash (Alpine is
    #                       busybox-only by default)
    #   curl/ca-certs     — fetch probes + TLS roots
    #   iptables/ip6tables/sudo — the air-gap firewall (applied later)
    # (Node + npm + Claude Code are installed by `iceclimber agent install claude`.)
    apk add \
      libgcc libstdc++ ripgrep bash git curl ca-certificates \
      iptables ip6tables sudo
- mode: system
  script: |
    #!/bin/sh
    # Smoke-check the prereqs so a broken provision fails `make demo-up` loudly.
    set -eux
    rg --version
    bash --version
